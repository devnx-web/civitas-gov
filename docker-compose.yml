# Civitas Gov — Docker Compose para produção (EasyPanel, Railway, Coolify)
# Stack mínimo: apenas a aplicação Next.js.
# Banco de dados PostgreSQL e Wasabi S3 são serviços externos.
#
# INSTRUÇÕES:
# 1. Copie .env.example para .env e preencha as variáveis
# 2. Certifique-se de que o PostgreSQL externo está acessível
# 3. Suba: docker compose up -d --build
# 4. Acesse: http://localhost:3000

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: civitas_app
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_TRUST_HOST: ${AUTH_TRUST_HOST:-true}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_REGION: ${S3_REGION}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-false}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CRON_SECRET: ${CRON_SECRET:-}
      RUN_SEED: ${RUN_SEED:-false}
    volumes:
      - civitas_uploads:/app/uploads
    networks:
      - civitas_network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  civitas_uploads:
    driver: local

networks:
  civitas_network:
    driver: bridge
