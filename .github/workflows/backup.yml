name: Backup Diário do Banco

on:
  schedule:
    - cron: '0 2 * * *'  # 02:00 UTC = 23:00 BRT
  workflow_dispatch:

jobs:
  backup:
    name: pg_dump → S3
    runs-on: ubuntu-latest
    steps:
      - name: Instalar cliente PostgreSQL
        run: sudo apt-get install -y postgresql-client

      - name: Dump do banco
        env:
          PGPASSWORD: ${{ secrets.PGPASSWORD }}
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          pg_dump "${{ secrets.DATABASE_URL }}" \
            --format=custom \
            --no-owner \
            --no-acl \
            --file="civitas_backup_${TIMESTAMP}.dump"
          echo "BACKUP_FILE=civitas_backup_${TIMESTAMP}.dump" >> $GITHUB_ENV

      - name: Upload para S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.BACKUP_S3_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.BACKUP_S3_SECRET }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          aws s3 cp "$BACKUP_FILE" \
            "s3://${{ secrets.BACKUP_S3_BUCKET }}/backups/${BACKUP_FILE}" \
            --storage-class STANDARD_IA

      - name: Limpar backups com mais de 30 dias
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.BACKUP_S3_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.BACKUP_S3_SECRET }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          CUTOFF=$(date -d '30 days ago' +%Y-%m-%dT%H:%M:%S)
          aws s3api list-objects-v2 \
            --bucket "${{ secrets.BACKUP_S3_BUCKET }}" \
            --prefix "backups/civitas_backup_" \
            --query "Contents[?LastModified<'${CUTOFF}'].Key" \
            --output text | tr '\t' '\n' | \
            xargs -I{} aws s3 rm "s3://${{ secrets.BACKUP_S3_BUCKET }}/{}" || true
